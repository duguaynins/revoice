<!DOCTYPE html>
<html lang="auto">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title translate="no">nins/recorder.sys</title>

<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#FFFFFF">
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js');
}
</script>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/nes.css/css/nes.min.css">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body{
    background:#fff;
    color:#000;
    min-height:100vh;
    padding:16px;
    font-family:'Press Start 2P','Courier New',monospace;
    font-size:12px;
    image-rendering:pixelated;
}
::selection { background: #000; color: #fff; }
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: #eee; }
::-webkit-scrollbar-thumb { background: #000; border-radius: 0; }

.nes-btn {
    font-family:'Press Start 2P','Courier New',monospace;
    font-size:10px;
    padding:4px 12px;
    touch-action:manipulation;
}
.nes-btn::after { display:none; }

.nins-container{
    max-width:520px;
    margin:0 auto;
}

audio{
    display:none;
}

.player-wrap {
    display:flex;
    align-items:center;
    gap:8px;
    width:100%;
}
.player-wrap .pbtn {
    font-family:'Press Start 2P','Courier New',monospace;
    font-size:14px;
    width:36px;height:36px;
    border:2px solid #fff;
    background:transparent;
    color:#fff;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-shrink:0;
    touch-action:manipulation;
}
.player-wrap .pbtn:hover {
    background:#fff;
    color:#000;
}
.player-wrap .bar {
    flex:1;
    height:24px;
    border:2px solid #fff;
    cursor:pointer;
    position:relative;
}
.player-wrap .bar .fill {
    height:100%;
    width:0%;
    background:#fff;
    pointer-events:none;
}
.player-wrap .time {
    font-size:8px;
    white-space:nowrap;
    flex-shrink:0;
    font-family:'Courier New',monospace;
    min-width:70px;
    text-align:right;
    color:#fff;
}


#status{
    margin-bottom:1rem;
}

input[type="file"]{
    display:none;
}

</style>
</head>
<body>

<div class="nins-container">

<div class="nes-container not-rounded with-title">
    <p class="title">NINS / </p>
    <p class="title">RECORDER.SYS</p>

    <div class="button-group">
        <!--button class="nes-btn is-warning" id="importBtn">[IMPORT]</button!-->
        <button class="nes-btn is-error" id="startBtn">[REC]</button>
        <button class="nes-btn is-error" id="stopBtn" disabled>[STOP]</button>
    </div>


    <div class="nes-container is-dark is-rounded with-title">
        <p class="title">PLAYER</p>
        <span class="title" id="timeDisplay">0:00 / 0:00</span>
        <audio id="audioPlayer"></audio>
        <div class="player-wrap">
            <div class="bar" id="bar">
                <div class="fill" id="fill"></div>
            </div>
            
        </div>
    </div>

    <div class="button-group">
        <button class="nes-btn is-success" id="playBtn">[>]</button>
        <button class="nes-btn is-primary" id="reverseBtn" disabled>[REVERSE]</button>
        <!--a class="nes-btn" id="downloadLink" style="display:none">[DOWNLOAD]</a!-->
        <input type="file" id="fileInput" accept="audio/*">
    </div>
    <p class="nes-text" id="status">ADMINS: DUGUAYNINS</p>
    <div class="button-group">
        <button class="nes-btn is-warning" id="importBtn">[IMPORT]</button>
        <a class="nes-btn" id="downloadLink" style="display:none">[DOWNLOAD]</a>
    </div>

</div>

<br>


</div>

</div>

<script>

let recorder;
let chunks=[];
let originalBlob=null;
let normalBlob=null;
let reversedBlob=null;
let isReversed=false;
let originalFileName="";
let currentObjectUrl=null;

let audioContext=null;

async function getAudioContext(){
    if(!audioContext){
        audioContext=new(window.AudioContext||window.webkitAudioContext)();
    }
    if(audioContext.state==="suspended"){
        await audioContext.resume();
    }
    return audioContext;
}

function setAudioSource(blob,filename){
    if(currentObjectUrl)URL.revokeObjectURL(currentObjectUrl);
    currentObjectUrl=URL.createObjectURL(blob);
    audio.src=currentObjectUrl;
    download.href=currentObjectUrl;
    download.download=filename;
    download.style.display="inline-block";
}

const startBtn=document.getElementById("startBtn");
const stopBtn=document.getElementById("stopBtn");
const importBtn=document.getElementById("importBtn");
const fileInput=document.getElementById("fileInput");
const reverseBtn=document.getElementById("reverseBtn");

const audio=document.getElementById("audioPlayer");
const status=document.getElementById("status");
const download=document.getElementById("downloadLink");

const playBtn=document.getElementById("playBtn");
const fill=document.getElementById("fill");
const bar=document.getElementById("bar");
const timeDisplay=document.getElementById("timeDisplay");

function fmt(s){
    const m=Math.floor(s/60);
    const sec=Math.floor(s%60);
    return m+":"+(sec<10?"0":"")+sec;
}

function upd(){
    if(!audio.duration||isNaN(audio.duration)){
        fill.style.width="0%";
        timeDisplay.textContent="0:00 / 0:00";
        return;
    }
    fill.style.width=(audio.currentTime/audio.duration*100)+"%";
    timeDisplay.textContent=fmt(audio.currentTime)+" / "+fmt(audio.duration);
}

playBtn.addEventListener("click",()=>{
    if(audio.paused) audio.play();
    else audio.pause();
});

audio.addEventListener("play",()=>{playBtn.textContent="■";});
audio.addEventListener("pause",()=>{playBtn.textContent="▶";});
audio.addEventListener("ended",()=>{playBtn.textContent="▶";});
audio.addEventListener("timeupdate",upd);
audio.addEventListener("loadedmetadata",upd);

bar.addEventListener("click",(e)=>{
    if(!audio.duration||isNaN(audio.duration))return;
    const r=bar.getBoundingClientRect();
    audio.currentTime=((e.clientX-r.left)/r.width)*audio.duration;
});

startBtn.onclick=async()=>{

    if(!window.isSecureContext){
        status.innerText="ERROR: NOT SECURE CONTEXT (HTTPS/LOCALHOST NEEDED)";
        return;
    }
    if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){
        status.innerText="ERROR: MEDIA DEVICES API UNAVAILABLE";
        return;
    }

    try{

        const stream=await navigator.mediaDevices.getUserMedia({
            audio:true
        });

        chunks=[];

        recorder=new MediaRecorder(stream);

        recorder.ondataavailable=e=>{
            chunks.push(e.data);
        };

        recorder.onstop=()=>{

            originalBlob=new Blob(chunks,{
                type:"audio/webm"
            });
            normalBlob=originalBlob;
            reversedBlob=null;
            isReversed=false;

            originalFileName=Date.now()+".webm";  ///+

            setAudioSource(originalBlob,originalFileName);

            reverseBtn.disabled=false;

            status.innerText="STATUS: SAVED";

            stream.getTracks().forEach(track=>track.stop());

        };

        recorder.start();

        status.innerText="STATUS: RECORDING...";

        startBtn.disabled=true;
        stopBtn.disabled=false;

    }catch(e){

        console.error(e);

        const msg={
            NotAllowedError:"PERMISSION DENIED / BLOCKED BY BROWSER",
            NotFoundError:"NO MICROPHONE DEVICE FOUND",
            NotReadableError:"MICROPHONE BUSY / LOCKED",
            AbortError:"ABORTED",
        }[e.name]||e.message||"UNKNOWN ERROR";
        status.innerText="ERROR: "+msg;

    }

};

stopBtn.onclick=()=>{

    if(!recorder||recorder.state==="inactive")return;

    recorder.stop();

    startBtn.disabled=false;
    stopBtn.disabled=true;

    status.innerText="STATUS: STOPPED";

};

reverseBtn.onclick=async()=>{

    if(!normalBlob)return;

    const ctx=await getAudioContext();

    if(isReversed){

        setAudioSource(normalBlob,originalFileName);

        status.innerText="STATUS: NORMAL [+]";
        isReversed=false;
        return;

    }

    if(!reversedBlob){

        status.innerText="STATUS: REVERSING...";

        const arrayBuffer=await normalBlob.arrayBuffer();

        const buffer=await ctx.decodeAudioData(arrayBuffer);

        const reversed=ctx.createBuffer(
            buffer.numberOfChannels,
            buffer.length,
            buffer.sampleRate
        );

        for(let ch=0;ch<buffer.numberOfChannels;ch++){

            const input=buffer.getChannelData(ch);
            const output=reversed.getChannelData(ch);

            for(let i=0;i<input.length;i++){

                output[i]=input[input.length-1-i];

            }

        }

        reversedBlob=audioBufferToWav(reversed);

    }

    const reversedName=originalFileName.replace(/\.[^.]+$/,"")+"-.wav";
    setAudioSource(reversedBlob,reversedName);

    status.innerText="STATUS: REVERSED [-]";
    isReversed=true;

};

function audioBufferToWav(buffer){

    const numChannels=buffer.numberOfChannels;
    const sampleRate=buffer.sampleRate;
    const samples=buffer.length;

    const dataLength=samples*numChannels*2;

    const arrayBuffer=new ArrayBuffer(44+dataLength);

    const view=new DataView(arrayBuffer);

    function writeString(offset,string){

        for(let i=0;i<string.length;i++){

            view.setUint8(offset+i,string.charCodeAt(i));

        }

    }

    writeString(0,"RIFF");
    view.setUint32(4,36+dataLength,true);
    writeString(8,"WAVE");
    writeString(12,"fmt ");
    view.setUint32(16,16,true);
    view.setUint16(20,1,true);
    view.setUint16(22,numChannels,true);
    view.setUint32(24,sampleRate,true);
    view.setUint32(28,sampleRate*numChannels*2,true);
    view.setUint16(32,numChannels*2,true);
    view.setUint16(34,16,true);
    writeString(36,"data");
    view.setUint32(40,dataLength,true);

    let offset=44;

    for(let i=0;i<samples;i++){

        for(let ch=0;ch<numChannels;ch++){

            let sample=buffer.getChannelData(ch)[i];

            sample=Math.max(-1,Math.min(1,sample));

            view.setInt16(
                offset,
                sample<0?sample*32768:sample*32767,
                true
            );

            offset+=2;

        }

    }

    return new Blob(
        [arrayBuffer],
        {type:"audio/wav"}
    );

}

importBtn.onclick=()=>{
    fileInput.click();
};

fileInput.onchange=async(e)=>{

    const file=e.target.files[0];
    if(!file)return;

    status.innerText="STATUS: IMPORTING...";

    try{

        const ctx=await getAudioContext();

        const arrayBuffer=await file.arrayBuffer();
        const audioBuffer=await ctx.decodeAudioData(arrayBuffer);

        const wavBlob=audioBufferToWav(audioBuffer);

        normalBlob=wavBlob;
        originalBlob=wavBlob;
        reversedBlob=null;
        isReversed=false;

        originalFileName=file.name.replace(/\.[^.]+$/,"")+".wav";  ///+

        setAudioSource(wavBlob,originalFileName);

        reverseBtn.disabled=false;

        ///status.innerText='STATUS: IMPORTED "'+file.name+'"';
        status.innerText="STATUS: OPENED";

    }catch(err){

        console.error(err);
        status.innerText="ERROR: COULD NOT DECODE AUDIO";

    }

    fileInput.value="";

};

</script>

</body>
</html>
